{% set name = "marshmallow" %}
{% set version = "4.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 908acabd5aa14741419d3678d3296bda6abe28a167b7dcd05969ceb8256943ac

build:
  number: 0
  script: {{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vv
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    - flit-core <4
  run:
    - python
    - backports-datetime-fromisoformat  # [py<311]
    - typing_extensions  # [py<311]

test:
  imports:
    - marshmallow
    - marshmallow.constants
    - marshmallow.decorators
    - marshmallow.error_store
    - marshmallow.exceptions
    - marshmallow.orderedset
    - marshmallow.schema
    - marshmallow.utils
    - marshmallow.validate
  source_files:
    - tests
  commands:
    - pip check
    # Test issue - on Windows, large stamps are handled differently than in Unix.
    # Ignore mypy_test_cases directory as those are type-checking tests, not pytest tests
    - pytest -v tests --ignore=tests/mypy_test_cases # [not win]
    - pytest -v tests -k "not test_from_timestamp_with_overflow_value" --ignore=tests/mypy_test_cases # [win]
  requires:
    - pip
    - pytest
    - simplejson
    - pytz
  #downstream:
  #  - marshmallow-enum
  #  - marshmallow-sqlalchemy
  #  - dataclasses-json
  #  - marshmallow-oneofschema
  #  - great-expectations
  #  - webargs
  #  - flask-appbuilder
  #  - unstructured-client
  #  - azure-ai-ml
  #  - environs

about:
  home: https://github.com/marshmallow-code/marshmallow
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A lightweight library for converting complex datatypes to and from native Python datatypes.
  description: |
    marshmallow is an ORM/ODM/framework-agnostic library for
    converting complex datatypes, such as objects, to and from
    native Python datatypes.
  doc_url: https://marshmallow.readthedocs.io
  dev_url: https://github.com/marshmallow-code/marshmallow

extra:
  recipe-maintainers:
    - hajapy
    - rth
    - frol
    - igortg
    - carlodri
    - mariusvniekerk
